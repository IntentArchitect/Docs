trigger:
  batch: 'true'
  branches:
    include:
    - 'development-4.4x'

variables:
  - group: 'Pipeline Agent Pool Names'
  - name : githubToken
    value: $(GITHUB_READONLY)

pool:
  name: $(BuildPool.AzureManaged)
  demands:
  - 'ImageOverride -equals ubuntu-latest'

# resources:
#   repositories:
#     - repository: modules-dotnet
#       type: github
#       name: IntentArchitect/Intent.Modules.NET
#       ref: refs/heads/$(Build.SourceBranchName)  # Using the same branch name as the pipeline's branch
#       token: $(GITHUB_READONLY)  

steps:

  - checkout: self
    persistCredentials: 'true'
    fetchDepth: '1'

  - pwsh: |
      $GitUrl = "https://$(GITHUB_PAT)@github.com/jp-seini/Intent.Modules.NET.git"
      git clone 
    
