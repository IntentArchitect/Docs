trigger:
  batch: 'true'
  branches:
    include:
    - 'development-4.4x'

parameters:
- name: modules
  type: object
  default:
    - repositoryName: 'modules-dotnet'
      repositoryUrl: "https://github.com/IntentArchitect/Intent.Modules.NET.git"
      folderName: Intent.Modules.NET
    # - repositoryName: 'modules-common'
    #   repositoryUrl: "https://github.com/IntentArchitect/Intent.Modules.git"

variables:
  - group: 'Pipeline Agent Pool Names'

pool:
  name: $(BuildPool.AzureManaged)
  demands:
  - 'ImageOverride -equals ubuntu-latest'

steps:

  # checkout the branch docs repo
  - checkout: self
    persistCredentials: 'true'
    fetchDepth: '1'
    displayName: 'Checkout Docs branch'

  # for each of the above configured modules (under parameters)
  - ${{ each module in parameters.modules }} :
      # clone and checkout the correct branch
      # this checks if a branch exists in the module repo, with the same name as the current branch
      - pwsh: |
          git clone ${{ module.repositoryUrl }}
          cd  ${{ module.folderName }}
          
          # Check the remote to see if a branch exists which matches the source branch
          $branchExists = git ls-remote --heads origin $(Build.SourceBranchName) | Select-String -Pattern $(Build.SourceBranchName)

          # either use the SourceBranchName if it exists, or default to "development"
          if ($branchExists) {
              Write-Host "Checkout $(Build.SourceBranchName)"
              git checkout $(Build.SourceBranchName)
          } else {
              Write-Host "Checkout development"
              git checkout development
          }
        displayName: '${{ module.repositoryName }} checkout'
      
      - pwsh: |
          # get all "README.md" files in a docs folder under the module folder name
          Write-Host "Get-ChildItem -Path ""${{ module.folderName }}"" -Recurse -Filter README.md | Where-Object { $_.DirectoryName -like ""*\docs"" }"

          $files = Get-ChildItem -Path "${{ module.folderName }}" -Recurse -Filter README.md | Where-Object { $_.DirectoryName -like "*\docs" }

          $numberOfFiles = $files.Count
          Write-Host "Number of files found: $numberOfFiles"

          foreach ($file in $files) {
            Write-Host "Found matching file: $($file.FullName)"
            # Scan the file contents for the markdown header (starts with #)
            $firstHeader = Get-Content $filePath | Where-Object { $_ -match '^#' } | Select-Object -First 1
            if ($firstHeader) {
                # strip out the # from the header, to be left with the module name
                $cleanHeader = $firstHeader -replace '^#\s*', ''  
                Write-Host "First header (without #): $cleanHeader"
            } else {
                Write-Host "No header found - skipping file"
            }
          }
        displayName: '${{ module.repositoryName }} readme scan'


