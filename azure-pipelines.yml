trigger:
  batch: 'true'
  branches:
    include:
    - 'development-4.4x'

variables:
  - group: 'Pipeline Agent Pool Names'
  - githubToken: $(GITHUB_READONLY) 



pool:
  name: $(BuildPool.AzureManaged)
  demands:
  - 'ImageOverride -equals ubuntu-latest'

