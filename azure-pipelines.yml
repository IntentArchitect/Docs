trigger:
  batch: 'true'
  branches:
    include:
    - 'development-4.4x'

parameters:
- name: modules
  type: object
  default:
    - repositoryName: 'modules-dotnet'
      repositoryUrl: "https://github.com/IntentArchitect/Intent.Modules.NET.git"
      folderName: Intent.Modules.NET
    # - repositoryName: 'modules-common'
    #   repositoryUrl: "https://github.com/IntentArchitect/Intent.Modules.git"

variables:
  - group: 'Pipeline Agent Pool Names'

pool:
  name: $(BuildPool.AzureManaged)
  demands:
  - 'ImageOverride -equals ubuntu-latest'

steps:

  - checkout: self
    persistCredentials: 'true'
    fetchDepth: '1'
    displayName: 'Checkout Docs branch'

  - ${{ each module in parameters.modules }} :
      - pwsh: |
          git clone ${{ module.repositoryUrl }}
          cd  ${{ module.folderName }}
          $branchExists = git ls-remote --heads origin $(Build.SourceBranchName) | Select-String -Pattern $(Build.SourceBranchName)

          if ($branchExists) {
              git checkout $(Build.SourceBranchName)
          } else {
              git checkout development
          }
        displayName: 'Checkout branch for ${{ module.repositoryName }}' 
    
  # - checkout: modules-dotnet  # Checkout the branch from the second repo  

