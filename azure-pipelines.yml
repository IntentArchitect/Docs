trigger:
  batch: 'true'
  branches:
    include:
    - master
    - development
    - development-*

resources:
  pipelines:
  - pipeline: 'ModulesCommonPipeline'
    source: 'Modules'
    trigger:
      branches:
        include:
        - development
        - development-*
  - pipeline: 'ModulesImportersPipeline'
    source: 'Modules.Importers'
    trigger:
      branches:
        include:
        - development
        - development-*
  - pipeline: 'ModulesDotNetPipeline'
    source: 'Modules.NET'
    trigger:
      branches:
        include:
        - development
        - development-*
  repositories:
  - repository: modulesCommon
    type: github
    name: IntentArchitect/Intent.Modules
    endpoint: 'IntentSoftware'
    ref: refs/heads/development
  - repository: modulesImporters
    type: github
    name: IntentArchitect/Intent.Modules.Importers
    endpoint: 'IntentSoftware'
    ref: refs/heads/development
  - repository: modulesNet
    type: github
    name: IntentArchitect/Intent.Modules.NET
    endpoint: 'IntentSoftware'
    ref: refs/heads/development

variables:
  - group: 'Pipeline Agent Pool Names'

pool:
  name: $(BuildPool.AzureManaged)
  demands:
  - 'ImageOverride -equals ubuntu-latest'

steps:

  - checkout: self
    displayName: 'Checkout Docs'
    path: s  # explicit path keeps $(Build.SourcesDirectory) stable with multi-repo checkout
    fetchDepth: '0'  # full history required for DocFX to populate sitemap lastmod from git commit dates
    persistCredentials: 'true'

  - checkout: modulesCommon
    displayName: 'Checkout Intent.Modules'
    path: s/Intent.Modules
    fetchDepth: 1

  - checkout: modulesImporters
    displayName: 'Checkout Intent.Modules.Importers'
    path: s/Intent.Modules.Importers
    fetchDepth: 1

  - checkout: modulesNet
    displayName: 'Checkout Intent.Modules.NET'
    path: s/Intent.Modules.NET
    fetchDepth: 1

  # calculate the repo and branch which triggered this pipeline
  - powershell: |
      $trigPipeline = ""
      $trigBranch = ""

      if ("$(Resources.TriggeringAlias)" -eq "ModulesCommonPipeline") {
          $trigPipeline = "Modules"
          $trigBranch = "$(resources.pipeline.ModulesCommonPipeline.sourceBranch)"
      }
      elseif ("$(Resources.TriggeringAlias)" -eq "ModulesImportersPipeline") {
          $trigPipeline = "Modules.Importers"
          $trigBranch = "$(resources.pipeline.ModulesImportersPipeline.sourceBranch)"
      }
      elseif ("$(Resources.TriggeringAlias)" -eq "ModulesDotNetPipeline") {
          $trigPipeline = "Modules.NET"
          $trigBranch = "$(resources.pipeline.ModulesDotNetPipeline.sourceBranch)"
      }
      else {
          $trigPipeline = "Docs"
          $trigBranch = "$(Build.SourceBranchName)"
      }

      $trigBranchName = $trigBranch -replace '^refs/heads/', ''

      # Branch to pass to each module repo clone (merge-repo-docs.ps1 handles per-repo fallback to development)
      $moduleBranchName = if ($trigBranchName -in @("master", "development")) { "development" } else { $trigBranchName }

      # Determine whether to sync to production or pre-production, and which subfolder
      if ($trigPipeline -eq "Docs") {
          if ($trigBranchName -eq "master") {
              $syncTarget = "production"
              $blobSubfolder = ""
          } else {
              # development or development-* docs push goes to pre-production staging
              $syncTarget = "preprod"
              $blobSubfolder = $trigBranchName
          }
      } else {
          # Module pipeline triggered this build
          if ($trigBranchName -eq "development") {
              $syncTarget = "production"
              $blobSubfolder = ""
          } else {
              $syncTarget = "preprod"
              $blobSubfolder = $trigBranchName
          }
      }

      if ($syncTarget -eq "production") {
          $agentMarkdownBaseUrl = "https://docs.intentarchitect.com/docs-md/"
      } elseif ($blobSubfolder) {
          $agentMarkdownBaseUrl = "https://doc-pre.intentarchitect.com/$blobSubfolder/docs-md/"
      } else {
          $agentMarkdownBaseUrl = "https://doc-pre.intentarchitect.com/docs-md/"
      }

      Write-Host "##vso[task.setvariable variable=triggeredByPipeline]$trigPipeline"
      Write-Host "##vso[task.setvariable variable=triggeredByBranch]$trigBranch"
      Write-Host "##vso[task.setvariable variable=triggeredByBranchNameOnly]$trigBranchName"
      Write-Host "##vso[task.setvariable variable=moduleBranchName]$moduleBranchName"
      Write-Host "##vso[task.setvariable variable=syncTarget]$syncTarget"
      Write-Host "##vso[task.setvariable variable=blobSubfolder]$blobSubfolder"
      Write-Host "##vso[task.setvariable variable=agentMarkdownBaseUrl]$agentMarkdownBaseUrl"
    displayName: 'Determine and Set Variables for Triggered Pipeline'

  - pwsh: |
      Write-Host "Triggered By Pipeline:    $(triggeredByPipeline)"
      Write-Host "Triggered By Branch:      $(triggeredByBranch)"
      Write-Host "Triggered By BranchNameOnly: $(triggeredByBranchNameOnly)"
      Write-Host "Module Branch Name:       $(moduleBranchName)"
      Write-Host "Sync Target:              $(syncTarget)"
      Write-Host "Blob Subfolder:           $(blobSubfolder)"
      Write-Host "Agent Markdown Base URL:  $(agentMarkdownBaseUrl)"
    displayName: 'Output pipeline variables'

  # Switch each repo to the correct feature branch when a non-development branch is in play.
  # Checkouts above land on the default branch; this step corrects them if a matching branch exists.
  - pwsh: |
      # Docs repo — only needed for module-triggered feature-branch builds
      if ("$(triggeredByPipeline)" -ne "Docs") {
          $target = "$(triggeredByBranchNameOnly)"
          if ($target -ne "development") {
              try {
                  Invoke-RestMethod "https://api.github.com/repos/$(Build.Repository.Name)/branches/$target" | Out-Null
                  git -C "$(Build.SourcesDirectory)" fetch --depth=1 origin $target
                  git -C "$(Build.SourcesDirectory)" checkout -B $target FETCH_HEAD
                  Write-Host "Switched docs repo to '$target'"
              } catch {
                  Write-Host "Branch '$target' not found in docs repo, using default checkout"
              }
          }
      }

      # Module repos
      function Switch-RepoBranch($repoPath, $repoName, $branch) {
          if ($branch -eq "development") {
              Write-Host "${repoName}: using default checkout"
              return
          }
          try {
              Invoke-RestMethod "https://api.github.com/repos/IntentArchitect/$repoName/branches/$branch" | Out-Null
              git -C $repoPath fetch --depth=1 origin $branch
              git -C $repoPath checkout -B $branch FETCH_HEAD
              Write-Host "Switched $repoName to '$branch'"
          } catch {
              Write-Host "Branch '$branch' not found in $repoName, using default checkout"
          }
      }

      $branch = "$(moduleBranchName)"
      Switch-RepoBranch "$(Build.SourcesDirectory)/Intent.Modules.NET"        "Intent.Modules.NET"        $branch
      Switch-RepoBranch "$(Build.SourcesDirectory)/Intent.Modules"            "Intent.Modules"            $branch
      Switch-RepoBranch "$(Build.SourcesDirectory)/Intent.Modules.Importers"  "Intent.Modules.Importers"  $branch
    displayName: 'Switch repos to correct branches'

  - template: PipelineScripts/templates/merge-modules.steps.yml

  - pwsh: |
      dotnet tool install docfx --version 2.78.5
    displayName: 'dotnet tool install docfx'

  - pwsh: ./_build.ps1 -BaseUrl '$(agentMarkdownBaseUrl)' -FailOnUnresolvedXref
    displayName: 'Build documentation'

  - pwsh: |
      $root = '$(Build.SourcesDirectory)/_site'
      $files = Get-ChildItem -Path $root -Recurse -File
      Write-Host "Total files in _site: $($files.Count)"
      $files | ForEach-Object { $_.FullName.Substring($root.Length + 1) } | Sort-Object
    displayName: 'List contents to sync'

  - task: AzureCLI@2
    displayName: 'Pre-production storage sync'
    condition: and(succeeded(), eq(variables['syncTarget'], 'preprod'))
    inputs:
      azureSubscription: 'Intent Architect Azure Resource Group'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az storage blob sync -s '$(Build.SourcesDirectory)/_site' -d '$(blobSubfolder)/' --container '$(intentarchitect.storageContainer)' --account-name '$(intentarchitect.preprod.storageAccountName)' --account-key '$(intentarchitect.preprod.storageAccountKey)' --delete-destination 'true'

  - task: AzureCLI@2
    displayName: 'Production storage sync'
    condition: and(succeeded(), eq(variables['syncTarget'], 'production'))
    inputs:
      azureSubscription: 'Intent Architect Azure Resource Group'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az storage blob sync -s '$(Build.SourcesDirectory)/_site' --container '$(intentarchitect.storageContainer)' --account-name '$(intentarchitect.storageAccountName)' --account-key '$(intentarchitect.storageAccountKey)' --delete-destination 'true'
