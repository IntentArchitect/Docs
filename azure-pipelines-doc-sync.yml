trigger: none

pr: none

schedules:
- cron: '0 0 * * *'
  displayName: 'Daily docs sync at 2am SAST (00:00 UTC)'
  branches:
    include:
    - master
  always: true

resources:
  repositories:
  - repository: modulesCommon
    type: github
    name: IntentArchitect/Intent.Modules
    endpoint: 'IntentSoftware'
    ref: refs/heads/development
  - repository: modulesImporters
    type: github
    name: IntentArchitect/Intent.Modules.Importers
    endpoint: 'IntentSoftware'
    ref: refs/heads/development
  - repository: modulesNet
    type: github
    name: IntentArchitect/Intent.Modules.NET
    endpoint: 'IntentSoftware'
    ref: refs/heads/development

variables:
  - group: 'Pipeline Agent Pool Names'
  - name: 'vstsFeedUrl'
    value: 'https://pkgs.dev.azure.com/intentarchitect/4bb4c1b9-5b56-4972-8bac-0ad3fa64204e/_packaging/intentarchitect-feed/nuget/v3/index.json'

pool:
  name: $(BuildPool.AzureManaged)
  demands:
  - 'ImageOverride -equals ubuntu-latest'

steps:
  - checkout: self
    displayName: 'Checkout Docs'
    path: s  # explicit path keeps $(Build.SourcesDirectory) stable with multi-repo checkout
    fetchDepth: '1'
    persistCredentials: 'true'

  - checkout: modulesCommon
    displayName: 'Checkout Intent.Modules'
    path: s/Intent.Modules
    fetchDepth: 1

  - checkout: modulesImporters
    displayName: 'Checkout Intent.Modules.Importers'
    path: s/Intent.Modules.Importers
    fetchDepth: 1

  - checkout: modulesNet
    displayName: 'Checkout Intent.Modules.NET'
    path: s/Intent.Modules.NET
    fetchDepth: 1

  - template: PipelineScripts/templates/merge-modules.steps.yml

  # Required for entry in NuGet.Config that is generated as part of 'dotnet pack'.
  - task: NuGetAuthenticate@1

  - task: PowerShell@2
    displayName: 'Synchronize documentation to OpenAI Embedding Store'
    inputs:
      targetType: 'inline'
      pwsh: true
      script: |
        dotnet tool install DocSyncEngine --add-source $(vstsFeedUrl) --global
        docsync ingest -i "$(Build.SourcesDirectory)/src" --store $(OpenAiEmbeddingStoreId) --concurrency 4 --plain-output --api-key $(OpenAiEmbeddingsKey)